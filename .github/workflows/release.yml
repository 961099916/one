name: Build & Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.gitignore'

jobs:
  release:
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Set Release Version with Timestamp
        shell: bash
        run: |
          # 获取当前时间戳 (YYYYMMDDHHmm)
          TIMESTAMP=$(date +'%Y%m%d%H%M')
          # 读取 package.json 中的基础版本号
          BASE_VERSION=$(node -p "require('./package.json').version")
          # 拼接新版本号
          NEW_VERSION="${BASE_VERSION}-${TIMESTAMP}"
          echo "New Version: $NEW_VERSION"
          # 更新 package.json (仅在内存/当前运行环境中生效)
          npm version $NEW_VERSION --no-git-tag-version
          # 注入环境变量供 electron-builder 使用 (可选)
          echo "APP_VERSION=$NEW_VERSION" >> $GITHUB_ENV

      - name: Build and Publish
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 如果有证书，可以在这里配置
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          # CSC_LINK: ${{ secrets.CSC_LINK }}
          # CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          # WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Cleanup release (optional)
        if: always()
        shell: bash
        run: rm -rf release/
