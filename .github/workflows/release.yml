name: Build & Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.gitignore'

permissions:
  contents: write

jobs:
  # 阶段一：创建 GitHub Release，输出版本号供后续 job 使用
  create-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set-version.outputs.version }}
      release_id: ${{ steps.create.outputs.release_id }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Set Release Version
        id: set-version
        shell: bash
        run: |
          BASE_VERSION=$(node -p "require('./package.json').version" | cut -d'.' -f1,2)
          NEW_VERSION="${BASE_VERSION}.${{ github.run_number }}"
          echo "New Version: $NEW_VERSION"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Draft Release
        id: create
        uses: actions/github-script@v8
        with:
          script: |
            const version = '${{ steps.set-version.outputs.version }}';
            let releaseId;
            try {
              const { data } = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: `v${version}`,
                name: `v${version}`,
                draft: true,
                prerelease: false
              });
              releaseId = data.id;
              console.log(`Created draft release v${version} (id: ${releaseId})`);
            } catch (e) {
              if (e.status === 422) {
                const { data } = await github.rest.repos.listReleases({
                  owner: context.repo.owner,
                  repo: context.repo.repo
                });
                const existing = data.find(r => r.tag_name === `v${version}`);
                releaseId = existing?.id;
                console.log(`Release v${version} already exists (id: ${releaseId})`);
              } else {
                throw e;
              }
            }
            core.setOutput('release_id', releaseId);

  # 阶段二：各平台并行构建并上传到已创建的 Release
  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS (arm64 + x64 同时构建，所有可用 macOS runner 均为 arm64)
          - os: macos-latest
            arch: universal
            platform: mac
          # Windows x64
          - os: windows-latest
            arch: x64
            platform: win
          # Linux x64
          - os: ubuntu-latest
            arch: x64
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Linux Dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm fakeroot dpkg

      - name: Install Dependencies
        run: npm install

      - name: Set Release Version
        shell: bash
        run: |
          NEW_VERSION="${{ needs.create-release.outputs.version }}"
          echo "New Version: $NEW_VERSION"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('./package.json', 'utf8'));
            pkg.version = '$NEW_VERSION';
            fs.writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "APP_VERSION=$NEW_VERSION" >> $GITHUB_ENV

      - name: Build Frontend & Electron (Vite)
        run: npx vite build

      - name: Build and Publish (macOS arm64 + x64)
        if: matrix.platform == 'mac'
        run: npx electron-builder --mac --arm64 --x64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          # CSC_LINK: ${{ secrets.CSC_LINK }}
          # CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

      - name: Build and Publish (Windows)
        if: matrix.platform == 'win'
        run: npx electron-builder --win --x64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          # WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Build and Publish (Linux)
        if: matrix.platform == 'linux'
        run: npx electron-builder --linux --x64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup Build Artifacts
        if: always()
        shell: bash
        run: rm -rf release/

  # 阶段三：所有平台构建完成后，将 Draft 发布为正式 Release
  publish:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - name: Publish Release
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false
            });
            console.log('Release published successfully!');
