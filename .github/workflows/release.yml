name: Build & Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.gitignore'

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon (arm64) - macos-latest 默认是 M 系列机器
          - os: macos-latest
            arch: arm64
            platform: mac
          # macOS Intel (x64) - macos-12 是当前可用的 Intel 版本（macos-13 已下线）
          - os: macos-12
            arch: x64
            platform: mac
          # Windows x64
          - os: windows-latest
            arch: x64
            platform: win
          # Linux x64
          - os: ubuntu-latest
            arch: x64
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Linux Dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm fakeroot dpkg

      - name: Install Dependencies
        run: npm install

      - name: Set Release Version
        shell: bash
        run: |
          # 读取 package.json 中的 major.minor 版本
          BASE_VERSION=$(node -p "require('./package.json').version" | cut -d'.' -f1,2)
          # 用 GitHub run_number 作为 patch，保证 semver 合法且递增
          NEW_VERSION="${BASE_VERSION}.${{ github.run_number }}"
          echo "New Version: $NEW_VERSION"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('./package.json', 'utf8'));
            pkg.version = '$NEW_VERSION';
            fs.writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "APP_VERSION=$NEW_VERSION" >> $GITHUB_ENV

      - name: Build Frontend & Electron (Vite)
        run: npx vite build

      - name: Build and Publish (macOS arm64)
        if: matrix.platform == 'mac' && matrix.arch == 'arm64'
        run: npx electron-builder --mac --arm64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          # CSC_LINK: ${{ secrets.CSC_LINK }}
          # CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

      - name: Build and Publish (macOS x64)
        if: matrix.platform == 'mac' && matrix.arch == 'x64'
        run: npx electron-builder --mac --x64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          # CSC_LINK: ${{ secrets.CSC_LINK }}
          # CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

      - name: Build and Publish (Windows)
        if: matrix.platform == 'win'
        run: npx electron-builder --win --x64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          # WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Build and Publish (Linux)
        if: matrix.platform == 'linux'
        run: npx electron-builder --linux --x64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup Build Artifacts
        if: always()
        shell: bash
        run: rm -rf release/
